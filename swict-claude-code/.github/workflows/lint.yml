name: Lint

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Use Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '20.x'

    - name: Install dependencies
      run: npm ci

    - name: Lint code
      run: |
        echo "Running basic Node.js syntax check..."
        node --check claude-config-switcher.js
        node --check src/*.js
        echo "✅ Syntax check passed!"

    - name: Check for console.log statements
      run: |
        if grep -r "console\.log" src/ --include="*.js" 2>/dev/null; then
          echo "⚠️  Warning: Found console.log statements"
          echo "Consider using the UI module for logging"
        else
          echo "✅ No console.log statements found"
        fi

    - name: Check for TODO comments
      run: |
        if grep -r "TODO" src/ --include="*.js" 2>/dev/null; then
          echo "⚠️  Found TODO comments - consider addressing them"
        else
          echo "✅ No TODO comments in production code"
        fi
